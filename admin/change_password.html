<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --deep-black: #020203;
      --onyx: #0b0b0d;
      --graphite: #111216;
      --accent: #d6b372;
      --muted: #868995;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: radial-gradient(circle at top, #191a20 0%, var(--deep-black) 45%);
      color: #f7f7f9;
      min-height: 100vh;
      line-height: 1.6;
    }

    .page-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }

    .auth-layout {
      min-height: calc(100vh - 120px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 0;
    }

    .auth-card {
      max-width: 420px;
      width: 100%;
      background: linear-gradient(145deg, var(--graphite), var(--deep-black));
      border-radius: 24px;
      padding: 2.25rem 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.65);
    }

    .auth-card h1 {
      font-size: 2rem;
      margin-bottom: 0.25rem;
    }

    .auth-card p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.75rem;
    }

    .auth-card form {
      display: grid;
      gap: 1rem;
    }

    .auth-card label {
      font-size: 0.9rem;
    }

    .auth-card input {
      width: 100%;
      margin-top: 0.35rem;
      padding: 0.7rem 0.85rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(5, 5, 8, 0.9);
      color: #f7f7f9;
    }

    .auth-card input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .auth-card button {
      margin-top: 0.5rem;
      border-radius: 999px;
      padding: 0.9rem 1.6rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: #000;
      color: #fff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .auth-card button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>

<body>
  <main class="page-shell auth-layout">
    <section class="auth-card">
      <h1>Secure Account</h1>
      <p>Please update your temporary password to continue to the dashboard.</p>

      <form id="reset-form">
        <div id="error-message"
          style="display:none; color:#ff6b6b; font-size:0.85rem; padding:0.5rem; background:rgba(255,107,107,0.1); border-radius:8px;">
        </div>
        <div id="success-message"
          style="display:none; color:#51cf66; font-size:0.85rem; padding:0.5rem; background:rgba(81,207,102,0.1); border-radius:8px;">
        </div>

        <label>New Password
          <input type="password" id="new_password" placeholder="••••••••" required>
        </label>

        <label>Confirm New Password
          <input type="password" id="confirm_password" placeholder="••••••••" required>
        </label>

        <button type="submit">Update Password</button>
      </form>

      <script>
        document.getElementById('reset-form').addEventListener('submit', async function (e) {
          e.preventDefault();
          const errorEl = document.getElementById('error-message');
          const successEl = document.getElementById('success-message');
          errorEl.style.display = 'none';
          successEl.style.display = 'none';

          const newPassword = document.getElementById('new_password').value;
          const confirmPassword = document.getElementById('confirm_password').value;

          if (newPassword !== confirmPassword) {
            errorEl.textContent = 'Passwords do not match.';
            errorEl.style.display = 'block';
            return;
          }

          try {
            const res = await fetch('change_password.php', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ new_password: newPassword, confirm_password: confirmPassword })
            });
            const result = await res.json();

            if (res.ok && result.success) {
              successEl.textContent = 'Password updated successfully! Redirecting...';
              successEl.style.display = 'block';

              setTimeout(() => {
                // Check the role returned from PHP
                if (result.user_role === 'admin') {
                  window.location.href = 'dashboard.html'; // Send admins to their dashboard
                } else {
                  window.location.href = '../index.html';  // Send customers to the main store
                }
              }, 1500);
            } else {
              errorEl.textContent = result.error || 'Failed to update password.';
              errorEl.style.display = 'block';
            }
          } catch (err) {
            errorEl.textContent = 'Network error. Please try again.';
            errorEl.style.display = 'block';
          }
        });
      </script>
    </section>
  </main>
</body>

</html>
